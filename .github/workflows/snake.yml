name: generate snake and stats

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}
  push:
    branches: [ main ]

jobs:
  snake:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: HanuP69
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=catppuccin-mocha
            dist/github-contribution-grid-snake.svg

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  stats:
    runs-on: ubuntu-latest
    needs: snake
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: output

      - name: Generate stats SVGs
        run: |
          curl -s "https://github-readme-stats.vercel.app/api?username=HanuP69&show_icons=true&theme=catppuccin_mocha&hide_border=true&count_private=true&include_all_commits=true" -o github-stats.svg
          curl -s "https://github-readme-stats.vercel.app/api/top-langs/?username=HanuP69&layout=compact&theme=catppuccin_mocha&hide_border=true&langs_count=8" -o top-langs.svg
          curl -s "https://github-readme-streak-stats.herokuapp.com/?user=HanuP69&theme=catppuccin-mocha&hide_border=true" -o github-streak.svg

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add github-stats.svg top-langs.svg github-streak.svg
          git diff --staged --quiet || (git commit -m "Update stats SVGs" && git push)